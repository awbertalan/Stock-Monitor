<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browse Folders</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background: var(--bg); max-width: 900px; }
    h2 { color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 22px; margin-bottom: 18px;
    }

    #breadcrumb {
      font-size: 12px; color: var(--text-muted); margin-bottom: 14px;
      text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600;
    }
    #breadcrumb a { color: var(--text-muted); text-decoration: none; }
    #breadcrumb a:hover { color: var(--accent); }

    #listing { list-style: none; padding: 0; margin: 0; }
    #listing li {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      transition: background 0.1s;
    }
    #listing li:last-child { border-bottom: none; }
    #listing li:hover { background: var(--surface-hover); }
    .icon { font-size: 16px; color: var(--text-muted); }
    .entry-name { font-size: 14px; color: var(--text); font-weight: 500; }
    #empty {
      color: var(--text-muted); font-size: 13px; font-style: italic;
      text-align: center; padding: 24px;
    }
  </style>
</head>
<body>
  <h2>Browse Folders</h2>
  <div class="subtitle">Walk the on-disk instrument tree.</div>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/stocksearch">Stock Search</a>
    <a href="/browse" class="active">Browse Folders</a>
    <a href="/live-signals">Live Signals</a>
    <a href="/live-patterns">Live Patterns</a>
    <a href="/ohlc-capture">OHLC Capture</a>
    <a href="/scrape">Scrape</a>
    <a href="/settings">Settings</a>
    <a href="/help">Help</a>
    <button id="btn-update-all" class="nav-update-btn" onclick="startUpdateAll()">Update All</button>
  </nav>
  <div class="section">
    <div id="breadcrumb"></div>
    <ul id="listing"></ul>
    <div id="empty" style="display:none">No folders found. Run a search first.</div>
  </div>
  <script>
    function navigate(path) {
      fetch('/ls?path=' + encodeURIComponent(path))
        .then(r => r.json())
        .then(render);
    }

    function render(data) {
      if (data.error) {
        document.getElementById('empty').textContent = data.error;
        document.getElementById('empty').style.display = '';
        return;
      }

      const parts = data.path ? data.path.split('/') : [];
      let bc = '<a href="#" onclick="navigate(\'\')">Instrumenttype</a>';
      parts.forEach((p, i) => {
        const sub = parts.slice(0, i + 1).join('/');
        bc += ' / <a href="#" onclick="navigate(\'' + sub.replace(/'/g, "\\'") + '\')">' + p + '</a>';
      });
      document.getElementById('breadcrumb').innerHTML = bc;

      const ul = document.getElementById('listing');
      ul.innerHTML = '';

      if (data.parent !== null && data.parent !== undefined) {
        const back = document.createElement('li');
        back.innerHTML = '<span class="icon">&#8593;</span><span class="entry-name">..</span>';
        back.onclick = () => navigate(data.parent);
        ul.appendChild(back);
      }

      data.entries.forEach(e => {
        if (!e.is_dir) return;
        const li = document.createElement('li');
        const childPath = data.path ? data.path + '/' + e.name : e.name;
        li.innerHTML = '<span class="icon">&#128193;</span><span class="entry-name">' + e.name + '</span>';
        li.onclick = () => navigate(childPath);
        ul.appendChild(li);
      });

      const dirs = data.entries.filter(e => e.is_dir);
      const empty = document.getElementById('empty');
      empty.style.display = (dirs.length === 0 && data.parent === null) ? '' : 'none';
    }

    navigate('');
  </script>
  <script src="/nav.js"></script>
</body>
</html>
